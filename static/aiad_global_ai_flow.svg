<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 900" font-family="Inter, Helvetica, Arial, sans-serif" role="img" aria-label="AIAD Global AI Flow diagram">
  <title>AIAD — AI Assisted Development — Global AI Flow</title>
  <defs>
    <filter id="cardShadow" x="-10%" y="-20%" width="120%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>

    <!-- spray softener: heavy blur for an airbrushed look -->
    <filter id="spray" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="38"/>
    </filter>

    <!-- spray gradients: saturated pastel at center, fully transparent at edge -->
    <radialGradient id="sprayIndigo" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#a5b4fc" stop-opacity="0.85"/>
      <stop offset="55%"  stop-color="#c7d2fe" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#eef2ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sprayAmber" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#fcd34d" stop-opacity="0.85"/>
      <stop offset="55%"  stop-color="#fde68a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fef3c7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sprayMint" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#6ee7b7" stop-opacity="0.85"/>
      <stop offset="55%"  stop-color="#a7f3d0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#d1fae5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sprayRose" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#fda4af" stop-opacity="0.85"/>
      <stop offset="55%"  stop-color="#fecdd3" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffe4e6" stop-opacity="0"/>
    </radialGradient>

    <!-- arrowheads -->
    <marker id="arrowSlate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrowEmerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#10b981"/>
    </marker>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0891b2"/>
    </marker>
    <marker id="arrowRose" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#e11d48"/>
    </marker>
  </defs>

  <!-- white canvas -->
  <rect x="0" y="0" width="1800" height="900" fill="#ffffff"/>

  <!-- title -->
  <text x="70" y="80" fill="#0f172a" font-size="44" font-weight="700" letter-spacing="-0.5">AIAD — AI Assisted Development</text>
  <text x="70" y="115" fill="#64748b" font-size="18" font-weight="500">Architecture · AI Engine · Knowledge</text>

  <!-- ============ sprayed column washes (airbrushed pastel clouds) ============ -->
  <g filter="url(#spray)">
    <!-- Knowledge Base — indigo spray (two overlapping blobs for organic feel) -->
    <ellipse cx="250" cy="420" rx="200" ry="240" fill="url(#sprayIndigo)"/>
    <ellipse cx="250" cy="700" rx="180" ry="200" fill="url(#sprayIndigo)"/>
    <!-- AI Engine — amber spray -->
    <ellipse cx="740" cy="430" rx="200" ry="220" fill="url(#sprayAmber)"/>
    <ellipse cx="740" cy="680" rx="170" ry="180" fill="url(#sprayAmber)"/>
    <!-- Generated Outputs — mint spray (shifted left to balance spacing with rose) -->
    <ellipse cx="1180" cy="430" rx="200" ry="220" fill="url(#sprayMint)"/>
    <ellipse cx="1180" cy="680" rx="170" ry="180" fill="url(#sprayMint)"/>
    <!-- Reinjection — rose spray -->
    <ellipse cx="1610" cy="430" rx="180" ry="220" fill="url(#sprayRose)"/>
    <ellipse cx="1610" cy="680" rx="160" ry="180" fill="url(#sprayRose)"/>
  </g>

  <!-- column labels (centered horizontally over each column, placed just above the cards) -->
  <text x="250"  y="195" text-anchor="middle" fill="#4338ca" font-size="17" font-weight="700" letter-spacing="3">KNOWLEDGE BASE</text>
  <text x="740"  y="195" text-anchor="middle" fill="#b45309" font-size="17" font-weight="700" letter-spacing="3">AI ENGINE  ·  FEATURES</text>
  <text x="1180" y="195" text-anchor="middle" fill="#047857" font-size="17" font-weight="700" letter-spacing="3">GENERATED OUTPUTS</text>
  <text x="1610" y="195" text-anchor="middle" fill="#be123c" font-size="17" font-weight="700" letter-spacing="3">REINJECTION</text>

  <!-- ============ animated edges (drawn before cards) ============ -->
  <!-- e1: src1 -> ai1 -->
  <path d="M390,265 L600,265" fill="none" stroke="#475569" stroke-width="2.5" stroke-dasharray="10 6" marker-end="url(#arrowSlate)">
    <animate attributeName="stroke-dashoffset" from="16" to="0" dur="0.9s" repeatCount="indefinite"/>
  </path>
  <!-- e3: src2 -> ai2 -->
  <path d="M390,435 L600,435" fill="none" stroke="#475569" stroke-width="2.5" stroke-dasharray="10 6" marker-end="url(#arrowSlate)">
    <animate attributeName="stroke-dashoffset" from="16" to="0" dur="0.9s" repeatCount="indefinite"/>
  </path>
  <!-- e4: src3 (Coding norms) -> out1 (Artefacts) — bypasses AI engine, routed through the amber/mint gap -->
  <path d="M390,605 L940,605 L940,290 L1040,290" fill="none" stroke="#475569" stroke-width="2.5" stroke-dasharray="10 6" marker-end="url(#arrowSlate)">
    <animate attributeName="stroke-dashoffset" from="16" to="0" dur="1.4s" repeatCount="indefinite"/>
  </path>
  <!-- e5: src4 (Integration tests def) -> out2 (Integration tests, executable) — bypasses AI engine -->
  <path d="M390,775 L980,775 L980,460 L1040,460" fill="none" stroke="#475569" stroke-width="2.5" stroke-dasharray="10 6" marker-end="url(#arrowSlate)">
    <animate attributeName="stroke-dashoffset" from="16" to="0" dur="1.6s" repeatCount="indefinite"/>
  </path>
  <!-- e6: ai1 -> out1 -->
  <path d="M880,265 L1040,265" fill="none" stroke="#10b981" stroke-width="3" stroke-dasharray="10 6" marker-end="url(#arrowEmerald)">
    <animate attributeName="stroke-dashoffset" from="16" to="0" dur="0.9s" repeatCount="indefinite"/>
  </path>
  <!-- e7: ai2 -> out2 -->
  <path d="M880,435 L1040,435" fill="none" stroke="#10b981" stroke-width="3" stroke-dasharray="10 6" marker-end="url(#arrowEmerald)">
    <animate attributeName="stroke-dashoffset" from="16" to="0" dur="0.9s" repeatCount="indefinite"/>
  </path>
  <!-- e8: out2 -> out3 -->
  <path d="M1320,435 L1470,435" fill="none" stroke="#0891b2" stroke-width="3" stroke-dasharray="10 6" marker-end="url(#arrowCyan)">
    <animate attributeName="stroke-dashoffset" from="16" to="0" dur="0.8s" repeatCount="indefinite"/>
  </path>
  <!-- dashed feedback: out2 top -> out1 bottom -->
  <path d="M1180,385 L1180,315" fill="none" stroke="#10b981" stroke-width="3" stroke-dasharray="6 5" marker-end="url(#arrowEmerald)">
    <animate attributeName="stroke-dashoffset" from="11" to="0" dur="0.7s" repeatCount="indefinite"/>
  </path>
  <!-- out1 -> out4 (reinjection) -->
  <path d="M1320,265 L1470,265" fill="none" stroke="#e11d48" stroke-width="3" stroke-dasharray="10 6" marker-end="url(#arrowRose)">
    <animate attributeName="stroke-dashoffset" from="16" to="0" dur="0.8s" repeatCount="indefinite"/>
  </path>

  <!-- ============ white cards (uniform 280 x 95) ============ -->

  <!-- src1: Business specs -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,-4; 0,4; 0,-4" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1" dur="4.0s" begin="0s" repeatCount="indefinite"/>
    <g filter="url(#cardShadow)">
      <rect x="110" y="220" width="280" height="95" rx="14" ry="14" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.5"/>
    </g>
    <circle cx="135" cy="252" r="6" fill="#6366f1"/>
    <text x="155" y="258" fill="#0f172a" font-size="20" font-weight="700">Business specs</text>
    <text x="135" y="290" fill="#64748b" font-size="15">business-specs.md</text>
  </g>

  <!-- src2: Global Architecture specification -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,-4; 0,4; 0,-4" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1" dur="4.4s" begin="0.7s" repeatCount="indefinite"/>
    <g filter="url(#cardShadow)">
      <rect x="110" y="390" width="280" height="95" rx="14" ry="14" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.5"/>
    </g>
    <circle cx="135" cy="422" r="6" fill="#8b5cf6"/>
    <text x="155" y="428" fill="#0f172a" font-size="19" font-weight="700">Architecture specification</text>
    <text x="135" y="460" fill="#64748b" font-size="15">architecture.md + PUML</text>
  </g>

  <!-- src3: Coding norms -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,-4; 0,4; 0,-4" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1" dur="4.2s" begin="1.4s" repeatCount="indefinite"/>
    <g filter="url(#cardShadow)">
      <rect x="110" y="560" width="280" height="95" rx="14" ry="14" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.5"/>
    </g>
    <circle cx="135" cy="592" r="6" fill="#14b8a6"/>
    <text x="155" y="598" fill="#0f172a" font-size="20" font-weight="700">Coding norms</text>
    <text x="135" y="630" fill="#64748b" font-size="15">Best practice • style</text>
  </g>

  <!-- src4: Integration tests definition -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,-4; 0,4; 0,-4" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1" dur="4.6s" begin="0.3s" repeatCount="indefinite"/>
    <g filter="url(#cardShadow)">
      <rect x="110" y="730" width="280" height="95" rx="14" ry="14" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.5"/>
    </g>
    <circle cx="135" cy="762" r="6" fill="#0ea5e9"/>
    <text x="155" y="768" fill="#0f172a" font-size="20" font-weight="700">Integration tests def</text>
    <text x="135" y="800" fill="#64748b" font-size="15">structured .md files</text>
  </g>

  <!-- ai1: Business Feature -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,-4; 0,4; 0,-4" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1" dur="4.3s" begin="1.0s" repeatCount="indefinite"/>
    <g filter="url(#cardShadow)">
      <rect x="600" y="220" width="280" height="95" rx="14" ry="14" fill="#ffffff" stroke="#fcd34d" stroke-width="1.5"/>
    </g>
    <circle cx="625" cy="252" r="6" fill="#f59e0b"/>
    <text x="645" y="258" fill="#0f172a" font-size="20" font-weight="700">Business Feature</text>
    <text x="625" y="290" fill="#64748b" font-size="15">FXYZ-description.md</text>
  </g>

  <!-- ai2: Integration tests -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,-4; 0,4; 0,-4" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1" dur="4.1s" begin="0.4s" repeatCount="indefinite"/>
    <g filter="url(#cardShadow)">
      <rect x="600" y="390" width="280" height="95" rx="14" ry="14" fill="#ffffff" stroke="#fcd34d" stroke-width="1.5"/>
    </g>
    <circle cx="625" cy="422" r="6" fill="#d946ef"/>
    <text x="645" y="428" fill="#0f172a" font-size="20" font-weight="700">Integration tests</text>
    <text x="625" y="460" fill="#64748b" font-size="15">FXYZ.integration.md</text>
  </g>

  <!-- out1: Artefacts -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,-4; 0,4; 0,-4" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1" dur="4.5s" begin="1.2s" repeatCount="indefinite"/>
    <g filter="url(#cardShadow)">
      <rect x="1040" y="220" width="280" height="95" rx="14" ry="14" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
    </g>
    <circle cx="1065" cy="252" r="6" fill="#10b981"/>
    <text x="1085" y="258" fill="#0f172a" font-size="20" font-weight="700">Artefacts</text>
    <text x="1065" y="290" fill="#64748b" font-size="15">Code API • Web UI</text>
  </g>

  <!-- out2: Integration tests (executable) -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,-4; 0,4; 0,-4" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1" dur="4.2s" begin="0.6s" repeatCount="indefinite"/>
    <g filter="url(#cardShadow)">
      <rect x="1040" y="390" width="280" height="95" rx="14" ry="14" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
    </g>
    <circle cx="1065" cy="422" r="6" fill="#10b981"/>
    <text x="1085" y="428" fill="#0f172a" font-size="20" font-weight="700">Integration tests</text>
    <text x="1065" y="460" fill="#64748b" font-size="15">Executable IT</text>
  </g>

  <!-- out3: Proof of execution -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,-4; 0,4; 0,-4" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1" dur="4.4s" begin="0.9s" repeatCount="indefinite"/>
    <g filter="url(#cardShadow)">
      <rect x="1470" y="390" width="280" height="95" rx="14" ry="14" fill="#ffffff" stroke="#fecdd3" stroke-width="1.5"/>
    </g>
    <circle cx="1495" cy="422" r="6" fill="#06b6d4"/>
    <text x="1515" y="428" fill="#0f172a" font-size="20" font-weight="700">Proof of execution</text>
    <text x="1495" y="460" fill="#64748b" font-size="15">Normalized logs</text>
  </g>

  <!-- out4: Reporting phase -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,-4; 0,4; 0,-4" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1" dur="4.3s" begin="0.2s" repeatCount="indefinite"/>
    <g filter="url(#cardShadow)">
      <rect x="1470" y="220" width="280" height="95" rx="14" ry="14" fill="#ffffff" stroke="#fecdd3" stroke-width="1.5"/>
    </g>
    <circle cx="1495" cy="252" r="6" fill="#e11d48"/>
    <text x="1515" y="258" fill="#0f172a" font-size="20" font-weight="700">Reporting</text>
    <text x="1495" y="290" fill="#64748b" font-size="15">Retro analysis</text>
  </g>
</svg>
